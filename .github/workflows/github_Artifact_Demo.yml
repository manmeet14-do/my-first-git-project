name: artifact demo


on:
 workflow_dispatch:
  

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: create files
        run: echo "hello Manmeet kaur how are you" > app.txt

    
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-file
          path: app.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-file
       
      - name: display file content
        run: cat app.txt      
