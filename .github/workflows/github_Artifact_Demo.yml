name: artifact demo 


on:
 workflow_dispatch:


jobs:
  build: 
    runs-on: ubuntu-latest

    
    steps:
      - name: creating file name
        run: echo "Hello Manmeet kaur How are you?" > app.txt
        
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-file
          path: app.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest


    steps:
      - name: download file
        uses: actions/download-artifact@v4
        with: 
          name: app-file

      - name: display file content
        run: cat app.txt



        
         
         
