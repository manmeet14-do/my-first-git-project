name: all topics


on:
 workflow_dispatch:


jobs:
  hello:
   runs-on: ubuntu-latest

   env:
    APP_NAME: dolly_App
    ENVIRONMENT: dev

   steps:
    - name: Running ENVIRONMENT
      run: echo "My Application name is $APP_NAME and env is $ENVIRONMENT"

  build:
   needs: hello
   runs-on: ubuntu-latest

   steps:
    - name: Building Application
      run: echo "Building application"

  testing:
   needs: build
   runs-on: ubuntu-latest
  
   steps:
    - name: Running Test
      run: echo "Running Tests"


  deploy:
   needs: testing
   runs-on: ubuntu-latest

   steps:
    - name: Deploying application
      run: echo "Deploying application"
  
  company_info:
   needs: deploy
   runs-on: ubuntu-latest


   steps:
    - name: Company information
      run: echo "My company Name is ${{ vars.COMPANY_NAME }}"

 
  employee_info:
   needs: company_info
   runs-on: ubuntu-latest

   env:
    EMP_ID: ${{ secrets.EMPLOYEE_ID }}
   
   steps:
    - name: Employee information
      run: echo "length of the value is ${#EMP_ID }"
