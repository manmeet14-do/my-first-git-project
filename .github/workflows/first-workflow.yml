name: Secrets


on:
 push:
  branches:
    - main





jobs:
  secrets_demo:
   runs-on: ubuntu-latest

   steps:
    - name: login to docker hub
      run: echo "$DOCKER_USERNAME" | docker login -u "$DOCKER_USERNAME" --password-stdin
      env:
       USERNAME: ${{ secrets.DOCKER_USERNAME }}
       PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
