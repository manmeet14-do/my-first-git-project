     runs-on: ubuntu-latest

     env:
       APP_NAME: my_app
       ENVIRONMENT: dev



     steps:
      - name: testing
        run: |
          echo "Application: $APP_NAME"
          echo "Environment: $ENVIRONMENT"

   build:
