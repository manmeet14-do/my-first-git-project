name: My first workflow



on:
 workflow_dispatch:

env:
  APP_NAME: my_app
  ENVIRONMENT: dev
  USERNAME: ${{ secrets.DOCKER_USERNAME }}




jobs:
   hello:
     runs-on: ubuntu-latest

       

     steps:
      - name: testing
        run: |
          echo "Application: $APP_NAME"
          echo "Environment: $ENVIRONMENT"

   build:
     needs: hello
     runs-on: ubuntu-latest

     steps:
      - name: bulding
        run: echo "Building"
 
       
   deploying:
     needs: build
     runs-on: ubuntu-latest

     steps:
       - name: deploying
         run: echo "deploying"
     

   environment:
     needs: build
     runs-on: ubuntu-latest


     
     steps:
       - name: print username
         run: echo "Username is $USERNAME"






