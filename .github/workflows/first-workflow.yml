name: multi Job workflow



on:
 push:
   branches:
     - main


jobs:
  test:
   runs-on: ubuntu-latest


   steps:
      - name: testing
        run: echo "Runnning Test"
     
  build:
   needs: test
   runs-on: ubuntu-latest
  
 
   steps:
      - name: building
        run: echo "Building app"


  deploy:
   needs: build
   runs-on: ubuntu-latest 


   steps:
      - name: deploying
        run: echo "Deploying app" 
  

 
